<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enquiry & Orders | Formality Clothing</title>
  <meta name="description" content="Send an enquiry about our formal suits, shoes and accessories. Ask about pricing, availability or custom tailoring with Formality Clothing.">
  <meta name="keywords" content="enquiry formal wear, order suit South Africa, custom tailoring enquiry">
  <link rel="canonical" href="Enquiry.html">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">Formality Clothing</div>
    <button class="nav-toggle">☰ Menu</button>
    <nav>
      <a href="Index.html">Home</a>
      <a href="About us.html">About</a>
      <a href="Products.html">Products</a>
      <a href="Enquiry.html" class="active">Enquiry</a>
      <a href="Contact Us.html">Contact</a>
    </nav>
  </header>

  <div class="banner">
    <h1>Order / Enquiry</h1>
    <p>The perfect stylish, formal brand in the area. Check out our available stock and find your desired fit.</p>
  </div>

  <main>
    <div class="section">
      <h2>Send Us an Enquiry</h2>
      <div class="gold-line"></div>

      <div class="form-wrap">
        <form id="enquiryForm">
          <div class="form-group">
            <label for="enquiryName">Name:</label>
            <input type="text" id="enquiryName" name="name" placeholder="Your full name">
          </div>
          <div class="form-group">
            <label for="enquiryEmail">Email:</label>
            <input type="email" id="enquiryEmail" name="email" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label for="enquiryType">Enquiry Type:</label>
            <select id="enquiryType" name="enquiryType">
              <option value="product">Product Enquiry</option>
              <option value="service">Service Enquiry</option>
              <option value="volunteer">Become a Volunteer</option>
              <option value="sponsor">Become a Sponsor</option>
            </select>
          </div>
          <div class="form-group">
            <label for="enquiryDetails">Order / Enquiry Details:</label>
            <textarea id="enquiryDetails" name="details" placeholder="Describe the item, size, colour, or any questions..."></textarea>
          </div>
          <button class="btn" type="submit">Submit Enquiry</button>
        </form>
      </div>

    </div>
  </main>

  <footer>
    <p>&copy; 2026 Formality Clothing</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
